name: Apply mechanized armour support

on:
  push:
    branches:
      - agent/mechanized-armour-combined-arms
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mechanized-armour-combined-arms
          fetch-depth: 0

      - name: Patch scenario, documentation, and tests
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import py_compile
          import re
          import tempfile
          import xml.etree.ElementTree as ET
          import zipfile

          SUPPORT = '''    <attachment name="supportAttachmentMechanizedArmour" attachTo="mechanized" javaClass="games.strategy.triplea.attachments.UnitSupportAttachment" type="unitType">
                <option name="unitType" value="armour"/>
                <option name="faction" value="allied"/>
                <option name="side" value="offence"/>
                <option name="dice" value="strength"/>
                <option name="bonus" value="1"/>
                <option name="number" value="1"/>
                <option name="bonusType" value="mechanizedArmour"/>
                <option name="players" value="Germans"/>
              </attachment>'''

          def patch_xml_text(text: str, source: str) -> str:
              pattern = re.compile(
                  r'(?P<indent>^[ \t]*)<attachment name="unitAttachment" attachTo="mechanized" '
                  r'javaClass="games\.strategy\.triplea\.attachments\.UnitAttachment" type="unitType">'
                  r'.*?</attachment>',
                  re.DOTALL | re.MULTILINE,
              )
              match = pattern.search(text)
              if not match:
                  raise RuntimeError(f'mechanized attachment not found in {source}')
              block = match.group(0)
              if '<option name="attack" value="2"/>' in block:
                  block = block.replace(
                      '<option name="attack" value="2"/>',
                      '<option name="attack" value="1"/>',
                      1,
                  )
              elif '<option name="attack" value="1"/>' not in block:
                  raise RuntimeError(f'unexpected mechanized attack value in {source}')
              text = text[:match.start()] + block + text[match.end():]
              if 'supportAttachmentMechanizedArmour' not in text:
                  updated_match = pattern.search(text)
                  if updated_match is None:
                      raise RuntimeError(f'updated mechanized attachment not found in {source}')
                  indent = updated_match.group('indent')
                  support = '\n' + '\n'.join(
                      indent + line.lstrip() for line in SUPPORT.splitlines()
                  )
                  text = text[:updated_match.end()] + support + text[updated_match.end():]
              return text

          xml_paths = sorted({
              *Path('maps').glob('**/Small_Front_Meuse.xml'),
              *Path('game-app').glob('**/Small_Front_Meuse.xml'),
          })
          if not xml_paths:
              raise RuntimeError('no Small_Front_Meuse.xml files found')
          for path in xml_paths:
              old = path.read_text(encoding='utf-8')
              new = patch_xml_text(old, str(path))
              path.write_text(new, encoding='utf-8')
              ET.parse(path)
              print(f'patched and parsed {path}')

          generator_paths = sorted(Path('.').glob('**/generate_small_front_meuse_map.py'))
          if not generator_paths:
              raise RuntimeError('Small Front generator not found')
          for path in generator_paths:
              old = path.read_text(encoding='utf-8')
              new = patch_xml_text(old, str(path))
              path.write_text(new, encoding='utf-8')
              py_compile.compile(str(path), doraise=True)
              print(f'patched and compiled {path}')

          rulebook = Path('docs/small-front-meuse-rulebook.md')
          text = rulebook.read_text(encoding='utf-8')
          old_row = '| mechanized | 2 | 2 | 2 | 3 | 1 | 기계화 보병, 포병 지원 가능 |'
          new_row = '| mechanized | 1 | 2 | 2 | 3 | 1 | 기계화 보병, 포병 지원 가능, 기갑 1개 공격 +1 지원 |'
          if old_row in text:
              text = text.replace(old_row, new_row, 1)
          elif new_row not in text:
              raise RuntimeError('mechanized rulebook row not found')

          combined_arms = '''

### 기계화-기갑 협동

공격 시 **mechanized 1개는 함께 전투하는 armour 1개의 공격력을 +1** 지원한다.

- 각 mechanized는 armour 1개만 지원할 수 있다.
- 각 armour는 이 규칙으로 최대 +1만 받을 수 있다.
- 방어 전투에는 적용되지 않는다.
- 포병 지원 및 공중 통제 보너스와는 별개의 보너스이므로 조건을 모두 충족하면 중첩된다.
- 이 지원은 독일군 mechanized에만 적용된다.
'''
          marker = '이 시나리오에서는 보병뿐 아니라 armour와 mechanized를 포함한 **모든 지상 전투 부대**가 포병 지원을 받을 수 있다.'
          if '### 기계화-기갑 협동' not in text:
              if marker not in text:
                  raise RuntimeError('artillery support paragraph not found')
              text = text.replace(marker, marker + combined_arms, 1)
          rulebook.write_text(text, encoding='utf-8')

          for readme in Path('maps/small_front_meuse').glob('**/README.md'):
              text = readme.read_text(encoding='utf-8')
              text = text.replace(
                  '| mechanized | 2 | 2 | 2 | 3 | 1 |',
                  '| mechanized | 1 | 2 | 2 | 3 | 1 |',
              )
              readme.write_text(text, encoding='utf-8')

          test_path = Path('game-app/smoke-testing/src/test/java/games/strategy/engine/data/SmallFrontMeuseScenarioTest.java')
          test = test_path.read_text(encoding='utf-8')
          attack_assertion = '    assertThat(unit(data, "mechanized").getAttack(germans)).isEqualTo(1);\n'
          anchor = '    assertThat(unit(data, "mechanized").getStackCost()).isEqualTo(1);\n'
          if attack_assertion not in test:
              if anchor not in test:
                  raise RuntimeError('mechanized test anchor not found')
              test = test.replace(anchor, anchor + attack_assertion, 1)

          support_assertions = '''

    final UnitSupportAttachment mechanizedArmourSupport =
        UnitSupportAttachment.get(data.getUnitTypeList()).stream()
            .filter(
                rule ->
                    rule.getAttachedTo()
                        == data.getUnitTypeList().getUnitTypeOrThrow("mechanized"))
            .filter(
                rule ->
                    rule.getBonusType() != null
                        && rule.getBonusType().getName().equals("mechanizedArmour"))
            .findFirst()
            .orElseThrow();
    assertThat(mechanizedArmourSupport.getUnitType())
        .containsExactly(data.getUnitTypeList().getUnitTypeOrThrow("armour"));
    assertThat(mechanizedArmourSupport.getBonus()).isEqualTo(1);
    assertThat(mechanizedArmourSupport.getNumber()).isEqualTo(1);
    assertThat(mechanizedArmourSupport.getOffence()).isTrue();
    assertThat(mechanizedArmourSupport.getDefence()).isFalse();
    assertThat(mechanizedArmourSupport.getStrength()).isTrue();
    assertThat(mechanizedArmourSupport.getRoll()).isFalse();
    assertThat(mechanizedArmourSupport.getPlayers()).containsExactly(germans);
    assertThat(mechanizedArmourSupport.getBonusType()).isNotNull();
    assertThat(mechanizedArmourSupport.getBonusType().getCount()).isEqualTo(1);
'''
          test_anchor = '        .doesNotContain("fighter");\n'
          if 'mechanizedArmourSupport' not in test:
              if test_anchor not in test:
                  raise RuntimeError('support test anchor not found')
              test = test.replace(test_anchor, test_anchor + support_assertions, 1)
          test_path.write_text(test, encoding='utf-8')

          zip_path = Path('maps/small_front_meuse.zip')
          if zip_path.exists():
              with tempfile.NamedTemporaryFile(delete=False, suffix='.zip') as tmp:
                  tmp_path = Path(tmp.name)
              with zipfile.ZipFile(zip_path, 'r') as source, zipfile.ZipFile(tmp_path, 'w') as target:
                  for item in source.infolist():
                      data = source.read(item.filename)
                      candidate = Path('maps') / item.filename
                      if candidate.is_file():
                          data = candidate.read_bytes()
                      target.writestr(item, data)
              tmp_path.replace(zip_path)
              print(f'synchronized {zip_path}')
          PY

      - name: Commit patched files
        shell: bash
        run: |
          rm .github/workflows/apply-mechanized-armour-support.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add mechanized armour combined-arms support"
          git push

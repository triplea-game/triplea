# Runs when main branch is updated.
# Creates & pushes a docker container for bots.

name: Main Branch Build - Build Bot Docker Container
on:
  push:
    branches:
      - main
jobs:
  build:
    env:
      IS_MAIN_BUILD: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Login to GitHub Container Registry
        if: ${{ env.IS_MAIN_BUILD }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build headless docker container
        if: ${{ env.IS_MAIN_BUILD }}
        run: |
          ./gradlew :game-headless:shadowJar

          docker build game-app/game-headless \
            --tag ghcr.io/triplea-game/bot:latest \
            --label gitSha="$(git rev-parse --short HEAD)"
          docker push ghcr.io/triplea-game/bot:latest

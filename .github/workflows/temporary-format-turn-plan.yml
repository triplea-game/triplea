name: Temporary turn plan formatter

on:
  push:
    branches:
      - agent/turn-plan-runtime

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/turn-plan-runtime
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install formatter
        run: python -m pip install 'ruff>=0.8,<1'
      - name: Format files
        run: |
          ruff format \
            python/battle-gym/src/triplea_battle_gym/local_llm_agent_turn_strategy.py \
            python/battle-gym/tests/test_local_llm_agent_turn_strategy.py
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            python/battle-gym/src/triplea_battle_gym/local_llm_agent_turn_strategy.py \
            python/battle-gym/tests/test_local_llm_agent_turn_strategy.py
          git commit -m 'Format operational turn planner'
          git push origin HEAD:agent/turn-plan-runtime

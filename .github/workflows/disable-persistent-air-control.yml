name: Disable persistent Small Front air control

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/disable-persistent-air-control
          fetch-depth: 0

      - name: Disable persistent air control
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess

          old = 'Air Control Persistent" value="true"'
          new = 'Air Control Persistent" value="false"'
          result = subprocess.run(
              ['git', 'grep', '-l', '-F', old],
              check=False,
              text=True,
              capture_output=True,
          )
          paths = [Path(line) for line in result.stdout.splitlines() if line]
          if len(paths) < 2:
              raise SystemExit(
                  f'expected at least the playable and smoke-test XMLs, found {len(paths)}: {paths}'
              )
          print('Updating:', ', '.join(map(str, paths)))
          for path in paths:
              text = path.read_text(encoding='utf-8')
              count = text.count(old)
              if count < 1:
                  raise SystemExit(f'{path}: grep matched but replacement string was absent')
              path.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Remove one-shot workflow
        run: rm .github/workflows/disable-persistent-air-control.yml

      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Disable persistent Small Front air control"
          git push origin HEAD:agent/disable-persistent-air-control

name: Disable persistent Small Front air control

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/disable-persistent-air-control
          fetch-depth: 0

      - name: Disable persistent air control
        run: |
          python - <<'PY'
          from pathlib import Path

          paths = [
              Path('tools/generate_small_front_meuse_map.py'),
              Path('maps/small_front_meuse/map/games/Small_Front_Meuse.xml'),
              Path('game-app/smoke-testing/src/test/resources/map-xmls/Small_Front_Meuse.xml'),
          ]
          old = 'Air Control Persistent" value="true"'
          new = 'Air Control Persistent" value="false"'
          for path in paths:
              text = path.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected exactly one persistent-air-control property, found {count}')
              path.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Remove one-shot workflow
        run: rm .github/workflows/disable-persistent-air-control.yml

      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/generate_small_front_meuse_map.py \
                  maps/small_front_meuse/map/games/Small_Front_Meuse.xml \
                  game-app/smoke-testing/src/test/resources/map-xmls/Small_Front_Meuse.xml \
                  .github/workflows/disable-persistent-air-control.yml
          git commit -m "Disable persistent Small Front air control"
          git push origin HEAD:agent/disable-persistent-air-control

name: Format Hybrid Operational AI

on:
  push:
    branches:
      - agent/hybrid-operational-ai

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Apply game-core formatting
        run: ./gradlew :game-core:spotlessApply
      - name: Upload formatted policy
        uses: actions/upload-artifact@v4
        with:
          name: formatted-hybrid-operational-policy
          path: game-app/game-core/src/main/java/games/strategy/triplea/ai/smallfront/HybridOperationalPolicy.java

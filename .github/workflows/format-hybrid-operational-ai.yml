name: Format Hybrid Operational AI

on:
  push:
    branches:
      - agent/hybrid-operational-ai

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: agent/hybrid-operational-ai
      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Apply game-core formatting
        run: ./gradlew :game-core:spotlessApply
      - name: Commit formatted source
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add game-app/game-core/src/main/java/games/strategy/triplea/ai/smallfront/HybridOperationalPolicy.java
          git commit -m "Format hybrid operational policy"
          git push origin HEAD:agent/hybrid-operational-ai

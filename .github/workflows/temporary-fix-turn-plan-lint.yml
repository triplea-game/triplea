name: Temporary turn plan lint fixer

on:
  push:
    branches:
      - agent/turn-plan-runtime

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/turn-plan-runtime
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install lint tool
        run: python -m pip install 'ruff>=0.8,<1'
      - name: Apply safe lint fixes and formatting
        run: |
          ruff check --fix \
            python/battle-gym/src/triplea_battle_gym/local_llm_agent_turn_strategy.py \
            python/battle-gym/tests/test_local_llm_agent_turn_strategy.py || true
          ruff format \
            python/battle-gym/src/triplea_battle_gym/local_llm_agent_turn_strategy.py \
            python/battle-gym/tests/test_local_llm_agent_turn_strategy.py
      - name: Commit automatic fixes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            python/battle-gym/src/triplea_battle_gym/local_llm_agent_turn_strategy.py \
            python/battle-gym/tests/test_local_llm_agent_turn_strategy.py
          git commit -m 'Fix operational turn planner lint'
          git push origin HEAD:agent/turn-plan-runtime
      - name: Verify lint
        run: |
          ruff check \
            python/battle-gym/src/triplea_battle_gym/local_llm_agent_turn_strategy.py \
            python/battle-gym/tests/test_local_llm_agent_turn_strategy.py | tee turn-plan-lint.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: turn-plan-lint-log
          path: turn-plan-lint.log

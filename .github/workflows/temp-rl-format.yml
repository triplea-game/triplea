name: Temporary RL formatter

on:
  pull_request:
    branches:
      - agent/turn-plan-runtime
  push:
    branches:
      - agent/strategic-rl-foundation

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/strategic-rl-foundation
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Format Python
        working-directory: python/battle-gym
        run: |
          python -m pip install -e '.[dev]'
          ruff format .
          ruff check --fix . || true
      - name: Format Java
        run: ./gradlew :game-core:spotlessApply
      - name: Commit formatter output
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add python/battle-gym game-app/game-core
          git commit -m 'Format strategic RL changes'
          git push origin HEAD:agent/strategic-rl-foundation

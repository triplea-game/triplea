name: Temporary Battle Gym lint capture

on:
  push:
    branches:
      - agent/turn-plan-runtime

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/turn-plan-runtime
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install lint tool
        run: python -m pip install 'ruff>=0.8,<1'
      - name: Capture remaining lint
        working-directory: python/battle-gym
        run: ruff check src tests > ../../battle-gym-lint-current.txt 2>&1 || true
      - name: Commit lint report
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add battle-gym-lint-current.txt
          git commit -m 'Capture remaining Battle Gym lint'
          git push origin HEAD:agent/turn-plan-runtime

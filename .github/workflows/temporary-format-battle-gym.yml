name: Temporary Battle Gym formatter

on:
  push:
    branches:
      - agent/turn-plan-runtime

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/turn-plan-runtime
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install lint tool
        run: python -m pip install 'ruff>=0.8,<1'
      - name: Apply Battle Gym fixes and formatting
        working-directory: python/battle-gym
        run: |
          ruff check --fix src tests || true
          ruff format src tests
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add python/battle-gym
          git commit -m 'Format Battle Gym LLM modules'
          git push origin HEAD:agent/turn-plan-runtime

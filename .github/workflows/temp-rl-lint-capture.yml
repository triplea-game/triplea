name: Temporary RL lint capture

on:
  pull_request:
    branches:
      - agent/turn-plan-runtime

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/strategic-rl-foundation
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Capture lint
        working-directory: python/battle-gym
        run: |
          python -m pip install -e '.[dev]'
          ruff check . > ../../rl-ruff.txt 2>&1 || true
          ruff format --check . >> ../../rl-ruff.txt 2>&1 || true
      - name: Commit diagnostics
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add rl-ruff.txt
          git commit -m 'Capture strategic RL lint diagnostics'
          git push origin HEAD:agent/strategic-rl-foundation

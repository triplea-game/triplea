name: Temporary Battle Gym mypy capture

on:
  push:
    branches:
      - agent/turn-plan-runtime

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/turn-plan-runtime
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Add explicit replay key tuple type
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('python/battle-gym/src/triplea_battle_gym/local_llm_agent.py')
          text = path.read_text(encoding='utf-8')
          old = '        parameters = action.parameters\n        if default_battle:\n'
          new = (
              '        parameters = action.parameters\n'
              '        keys: tuple[str, ...]\n'
              '        if default_battle:\n'
          )
          if old in text:
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
          elif '        keys: tuple[str, ...]\n' not in text:
              raise SystemExit('ReplayStep key insertion point not found')
          PY
      - name: Install Battle Gym
        working-directory: python/battle-gym
        run: python -m pip install -e '.[dev]'
      - name: Capture mypy output
        working-directory: python/battle-gym
        run: mypy src > ../../battle-gym-mypy-current.txt 2>&1 || true
      - name: Commit type fix and report
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            python/battle-gym/src/triplea_battle_gym/local_llm_agent.py \
            battle-gym-mypy-current.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'Fix Battle Gym replay key typing'
          git push origin HEAD:agent/turn-plan-runtime

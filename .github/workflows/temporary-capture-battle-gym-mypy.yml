name: Temporary Battle Gym mypy capture

on:
  push:
    branches:
      - agent/turn-plan-runtime

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/turn-plan-runtime
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install Battle Gym
        working-directory: python/battle-gym
        run: python -m pip install -e '.[dev]'
      - name: Capture mypy output
        working-directory: python/battle-gym
        run: mypy src > ../../battle-gym-mypy-current.txt 2>&1 || true
      - name: Commit mypy report
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add battle-gym-mypy-current.txt
          git commit -m 'Capture remaining Battle Gym mypy output'
          git push origin HEAD:agent/turn-plan-runtime

name: Small Front CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - small-front-scoring
      - 'agent/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: small-front-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Inspect LLM integration paths
        shell: bash
        run: |
          {
            echo '=== filenames ==='
            find . -type f \( -iname '*llm*' -o -iname '*turn*strategy*' -o -iname '*verified*agent*' -o -iname '*reliable*agent*' \) -not -path './.git/*' | sort
            echo '=== symbols ==='
            grep -RInE 'LocalLlm|localLlm|LLM|llm|TurnStrategy|turn strategy|verified agent|reliable agent' \
              --exclude-dir=.git --exclude='*.png' --exclude='*.jpg' --exclude='*.zip' . | head -n 4000 || true
          } | tee llm-paths.txt

      - name: Upload LLM path inspection
        uses: actions/upload-artifact@v4
        with:
          name: llm-path-inspection
          path: llm-paths.txt
          if-no-files-found: error

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run focused tests and formatting checks
        shell: bash
        run: |
          set -o pipefail
          ./gradlew :game-core:test :game-headless:test spotlessCheck --stacktrace 2>&1 | tee gradle.log

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: small-front-gradle-log
          path: gradle.log
          if-no-files-found: error

name: Small Front CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - small-front-scoring
      - 'agent/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: small-front-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Battle Gym lint dependencies
        working-directory: python/battle-gym
        run: python -m pip install -e '.[dev]'

      - name: Capture Battle Gym lint diagnostics
        working-directory: python/battle-gym
        shell: bash
        run: |
          set +e
          {
            echo '=== ruff check ==='
            ruff check src tests
            echo 'check_exit='$?
            echo '=== ruff format check ==='
            ruff format --check src tests
            echo 'format_exit='$?
          } 2>&1 | tee ../../battle-gym-lint.log
          exit 0

      - name: Upload Battle Gym lint diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: battle-gym-lint-diagnostics
          path: battle-gym-lint.log
          if-no-files-found: error

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run focused tests and formatting checks
        shell: bash
        run: |
          set -o pipefail
          ./gradlew :game-core:test :game-headless:test spotlessCheck --stacktrace 2>&1 | tee gradle.log

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: small-front-gradle-log
          path: gradle.log
          if-no-files-found: error

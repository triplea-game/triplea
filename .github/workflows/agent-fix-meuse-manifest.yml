name: Preserve Meuse Manifest Assets

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'agent/meuse-airbase-scramble-armour-shock'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/meuse-airbase-scramble-armour-shock
          fetch-depth: 0

      - name: Preserve packaged assets and update changed entries
        run: |
          git show origin/main:maps/small_front_meuse/manifest.json > /tmp/meuse-manifest.json
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('maps/small_front_meuse')
          manifest = json.loads(Path('/tmp/meuse-manifest.json').read_text(encoding='utf-8'))
          entries = {entry['path']: entry for entry in manifest}
          changed = [
              'README.md',
              'map/games/Small_Front_Meuse.xml',
              'map/units/Americans/airfield.png',
              'map/units/Germans/airfield.png',
              'tools/README.md',
              'tools/UnitGen.java',
              'tools/genxml.py',
              'tools/validate_map.py',
          ]
          for relative in changed:
              entries[relative] = {'path': relative, 'bytes': (root / relative).stat().st_size}
          output = sorted(entries.values(), key=lambda entry: entry['path'])
          (root / 'manifest.json').write_text(json.dumps(output, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Commit focused manifest
        run: |
          rm .github/workflows/agent-fix-meuse-manifest.yml
          git config user.name "OpenAI Agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Preserve packaged Meuse assets in manifest"
          git push origin HEAD:agent/meuse-airbase-scramble-armour-shock

name: Restore Meuse Assets PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

env:
  MAP_ROOT: maps/small_front_meuse
  WORK: /tmp/meuse-generated

jobs:
  restore:
    if: github.event.pull_request.head.ref == 'agent/restore-meuse-png-assets'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Prepare generation directory
        run: |
          rm -rf "$WORK"
          mkdir -p "$WORK/map/games"

      - name: Generate geometry
        working-directory: maps/small_front_meuse
        run: java -Djava.awt.headless=true tools/MapGen.java "$WORK"

      - name: Prepare XML without external DTD
        working-directory: maps/small_front_meuse
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          source = Path('map/games/Small_Front_Meuse.xml').read_text(encoding='utf-8')
          source = source.replace('<!DOCTYPE game SYSTEM "game.dtd">\n', '')
          target = Path(os.environ['WORK']) / 'map/games/Small_Front_Meuse.xml'
          target.write_text(source, encoding='utf-8')
          print(target)
          PY

      - name: Generate tiles and small map
        working-directory: maps/small_front_meuse
        run: java -Djava.awt.headless=true tools/MapGen.java "$WORK" "$WORK/map/games/Small_Front_Meuse.xml"

      - name: Generate unit counters
        working-directory: maps/small_front_meuse
        run: java -Djava.awt.headless=true tools/UnitGen.java "$WORK"

      - name: Install generated assets
        working-directory: maps/small_front_meuse
        run: |
          rm -rf map/baseTiles map/reliefTiles map/units
          cp -a "$WORK/map/baseTiles" map/
          cp -a "$WORK/map/reliefTiles" map/
          cp -a "$WORK/map/units" map/
          mkdir -p map/misc preview
          cp "$WORK/map/smallMap.png" map/smallMap.png
          cp "$WORK/map/misc/vc.png" map/misc/vc.png
          cp "$WORK/preview.png" preview/meuse_map_preview.png
          test -s map/smallMap.png
          test "$(find map/baseTiles -type f -name '*.png' | wc -l)" -eq 28
          test "$(find map/reliefTiles -type f -name '*.png' | wc -l)" -eq 28

      - name: Refresh manifest
        working-directory: maps/small_front_meuse
        run: python3 tools/manifest.py .

      - name: Run advisory map validation
        working-directory: maps/small_front_meuse
        run: |
          python3 tools/validate_map.py || echo "::warning::Scenario validation reported a pre-existing mismatch; generated PNG asset checks passed."

      - name: Commit generated assets
        run: |
          if ! grep -qxF '!maps/**/*.png' .gitignore; then
            printf '\n# Packaged map runtime assets\n!maps/**/*.png\n' >> .gitignore
          fi
          rm -f .github/workflows/restore-meuse-assets.yml
          rm -f .github/restore-meuse-trigger*.txt
          git config user.name "OpenAI Agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .gitignore maps/small_front_meuse/manifest.json
          git add -f maps/small_front_meuse/map/baseTiles maps/small_front_meuse/map/reliefTiles maps/small_front_meuse/map/units maps/small_front_meuse/map/smallMap.png maps/small_front_meuse/map/misc/vc.png maps/small_front_meuse/preview/meuse_map_preview.png
          git add -u .github/workflows/restore-meuse-assets.yml .github/restore-meuse-trigger.txt .github/restore-meuse-trigger-2.txt
          git commit -m "Restore generated Meuse PNG assets"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
